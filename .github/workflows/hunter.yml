name: Flight Hunter

on:
  schedule:
    # Cada 6 horas. Se usan minutos "17" en vez de "0" porque GitHub encola
    # (y a veces descarta) los crons que caen en punto por saturacion.
    - cron: "17 1,7,13,19 * * *"
  workflow_dispatch:
    inputs:
      forzar_resumen:
        description: "Enviar resumen a Telegram aunque ya se haya enviado hoy"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: flight-hunter
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar Flight Hunter
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_SUMMARY: ${{ inputs.forzar_resumen && '1' || '0' }}
        run: python hunter.py

      - name: Guardar historial de precios
        if: always()
        run: |
          git config user.name "flight-hunter-bot"
          git config user.email "bot@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "Historial de precios [skip ci]"
          git pull --rebase --autostash || true
          git push || echo "No se pudo hacer push (no critico)"
