name: Flight Hunter

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flight-hunter
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Marcar resumen diario (00 UTC = 19h Panama)
        run: |
          if [ "$(date -u +%H)" = "00" ]; then echo "SEND_SUMMARY=1" >> $GITHUB_ENV; fi

      - name: Ejecutar Flight Hunter
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python hunter.py

      - name: Guardar historial de precios
        if: always()
        run: |
          git config user.name "flight-hunter-bot"
          git config user.email "bot@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "Historial de precios [skip ci]"
          git pull --rebase --autostash || true
          git push || echo "No se pudo hacer push (no critico)"
